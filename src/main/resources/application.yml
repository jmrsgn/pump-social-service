spring:
  application:
    name: pump-social-service

  data:
    mongodb:
      auto-index-creation: true

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%X{requestId}] %-5level [%thread] %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

openai:
  api-key: ${OPENAI_API_KEY}

pump:
  security:
    internal-service-token: ${PUMP_INTERNAL_SERVICE_TOKEN}